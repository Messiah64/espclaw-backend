services:
  - type: web
    name: espclaw-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_FAST_MODEL
        sync: false
      - key: OPENAI_DEEP_MODEL
        sync: false
      - key: OPENAI_ENABLE_REALTIME
        value: true
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime-2.1
      - key: OPENAI_REALTIME_TRANSCRIPT_MODEL
        value: gpt-realtime-whisper
      - key: OPENAI_REALTIME_OUTPUT_AUDIO
        value: false
      - key: ASSISTANT_VOICE_OUTPUT_ENABLED
        value: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: OWNER_TELEGRAM_USER_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEVICE_PAIRING_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
